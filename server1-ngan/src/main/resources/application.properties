spring.application.name=server1-ngan
server.port=${PORT:8080}

# PostgreSQL - Render cung cap DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URLs cac server khac - cap nhat sau khi deploy xong
server2.url=${SERVER2_URL:https://server2-nhi.onrender.com}
server3.url=${SERVER3_URL:https://server3-my.onrender.com}
server4.url=${SERVER4_URL:https://server4-suong.onrender.com}
server5.url=${SERVER5_URL:https://server5-hang.onrender.com}

# Ten tram
station.name=Tram 1 - Ngan
station.id=server1-ngan

management.endpoints.web.exposure.include=health,info

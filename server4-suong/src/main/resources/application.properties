spring.application.name=server4-suong
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MY IDENTITY
station.id=server4-suong
station.order=4
station.name=Tram 4 - Suong

# ALL 5 SERVER URLs
server1.url=${SERVER1_URL:https://server1-ngan.onrender.com}
server2.url=${SERVER2_URL:https://server2-nhi.onrender.com}
server3.url=${SERVER3_URL:https://server3-my.onrender.com}
server4.url=${SERVER4_URL:https://server4-suong.onrender.com}
server5.url=${SERVER5_URL:https://server5-hang.onrender.com}

management.endpoints.web.exposure.include=health,info

spring.application.name=bus-monitoring
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# IDENTITY - bat buoc phai dat tren Render
station.id=${STATION_ID:server1-ngan}
station.order=${STATION_ORDER:1}
station.name=${STATION_NAME:Tram 1 - Ngan}

# ALL 5 SERVER URLs - bat buoc dien day du tren Render
# KHONG co gia tri mac dinh de buoc nguoi dung phai dien dung URL that
server1.url=${SERVER1_URL}
server2.url=${SERVER2_URL}
server3.url=${SERVER3_URL}
server4.url=${SERVER4_URL}
server5.url=${SERVER5_URL}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
